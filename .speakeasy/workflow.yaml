workflowVersion: 1.0.0
speakeasyVersion: 1.754.0
sources:
    mistral-azure-source:
        inputs:
        -   location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-azure:fuego-add-speech-endpoint-sdk-v2
    mistral-google-cloud-source:
        inputs:
        -   location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-google-cloud:fuego-add-speech-endpoint-sdk-v2
    mistral-openapi:
        inputs:
        -   location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi:fuego-add-speech-endpoint-sdk-v2
targets:
    mistralai-azure-sdk:
        target: python
        source: mistral-azure-source
        output: ./packages/azure
        publish:
            pypi:
                token: $pypi_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-azure-code-samples
            blocking: false
    mistralai-gcp-sdk:
        target: python
        source: mistral-google-cloud-source
        output: ./packages/gcp
        publish:
            pypi:
                token: $pypi_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-google-cloud-code-samples
            blocking: false
    mistralai-sdk:
        target: python
        source: mistral-openapi
        publish:
            pypi:
                token: $pypi_token
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/mistral-dev/mistral-dev/mistral-openapi-code-samples
            blocking: false
