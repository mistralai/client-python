name: Publish MISTRALAI-SDK
permissions:
  contents: read
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: 'Type "publish" to confirm.'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "**/RELEASES.md"
jobs:
  publish:
    name: Publish Python SDKs to PyPI
    # Auto-publish on push to main branch; require manual confirmation for workflow_dispatch
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_publish == 'publish')
    runs-on: ubuntu-latest
    environment:
      name: public-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Build mistralai
        run: |
          python scripts/prepare_readme.py
          uv build --sdist --wheel --out-dir dist/mistralai

      - name: Publish mistralai to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13
        with:
          packages-dir: dist/mistralai/
          print-hash: true
          verbose: true
          skip-existing: true

      - name: Build mistralai-azure
        working-directory: packages/azure
        run: |
          python scripts/prepare_readme.py
          uv build --sdist --wheel --out-dir ../../dist/mistralai-azure

      - name: Publish mistralai-azure to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13
        with:
          packages-dir: dist/mistralai-azure/
          print-hash: true
          verbose: true
          skip-existing: true

      - name: Build mistralai-gcp
        working-directory: packages/gcp
        run: |
          python scripts/prepare_readme.py
          uv build --sdist --wheel --out-dir ../../dist/mistralai-gcp

      - name: Publish mistralai-gcp to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13
        with:
          packages-dir: dist/mistralai-gcp/
          print-hash: true
          verbose: true
          skip-existing: true
