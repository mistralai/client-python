name: Generate MISTRAL-PYTHON-SDK-GOOGLE-CLOUD
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
"on":
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false
      set_version:
        description: optionally set a specific SDK version
        type: string
jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@7951d9dce457425b900b2dd317253499d98c2587 # v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
      speakeasy_version: latest
      target: mistralai-gcp-sdk
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      pypi_token: ${{ secrets.PYPI_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  align-version:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.branch_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Read version from gen.lock and update pyproject.toml
        run: |
          VERSION=$(grep 'releaseVersion:' packages/gcp/.speakeasy/gen.lock | head -1 | awk '{print $2}')
          echo "Aligning pyproject.toml to version: $VERSION"
          uv version "$VERSION" --directory packages/gcp

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push
        run: |
          git add packages/gcp/pyproject.toml
          if git diff --cached --quiet; then
            echo "No version change needed"
          else
            git commit -m "chore: align pyproject.toml version with gen.lock"
            git push
          fi
