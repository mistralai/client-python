examples:
  stream_chat:
    speakeasy-default-stream-chat:
      requestBody:
        application/json: {"model": "mistral-large-latest", "stream": true, "messages": [{"role": "user", "content": "Who is the best French painter? Answer in one short sentence."}], "response_format": {"type": "text"}}
      responses:
        "422":
          application/json: {}
  chat_completion_v1_chat_completions_post:
    speakeasy-default-chat-completion-v1-chat-completions-post:
      requestBody:
        application/json: {"model": "mistral-large-latest", "stream": false, "messages": [{"role": "user", "content": "Who is the best French painter? Answer in one short sentence."}], "response_format": {"type": "text"}}
      responses:
        "200":
          application/json: {"id": "cmpl-e5cc70bb28c444948073e77776eb30ef", "object": "chat.completion", "model": "mistral-small-latest", "usage": {"prompt_tokens": 0, "completion_tokens": 0, "total_tokens": 0}, "created": 1702256327, "choices": []}
        "422":
          application/json: {}
  stream_fim:
    speakeasy-default-stream-fim:
      requestBody:
        application/json: {"model": "codestral-latest", "stream": true, "prompt": "def", "suffix": "return a+b"}
      responses:
        "422":
          application/json: {}
  fim_completion_v1_fim_completions_post:
    userExample:
      requestBody:
        application/json: {"model": "codestral-latest", "stream": false, "prompt": "def", "suffix": "return a+b"}
      responses:
        "200":
          application/json: {"id": "447e3e0d457e42e98248b5d2ef52a2a3", "object": "chat.completion", "model": "codestral-2508", "usage": {"prompt_tokens": 8, "completion_tokens": 91, "total_tokens": 99}, "created": 1759496862, "choices": [{"index": 0, "message": {"role": "assistant", "content": "add_numbers(a: int, b: int) -> int:\n    \"\"\"\n    You are given two integers `a` and `b`. Your task is to write a function that\n    returns the sum of these two integers. The function should be implemented in a\n    way that it can handle very large integers (up to 10^18). As a reminder, your\n    code has to be in python\n    \"\"\"\n", "tool_calls": null, "prefix": false}, "finish_reason": "stop"}]}
